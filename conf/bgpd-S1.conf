! -*- bgp -*-
!
! BGPd sample configuratin file
!
! $Id: bgpd.conf.sample,v 1.1 2002/12/13 20:15:29 paul Exp $
!

hostname bgpd-S1
password en
enable password en

router bgp 1
  bgp router-id 9.0.0.1
  network 11.0.0.0/8
  no bgp network import-check
  
  ! Prefer rogue AS routes with route-map
  neighbor 9.0.0.2 remote-as 2
  neighbor 9.0.0.2 ebgp-multihop
  neighbor 9.0.0.2 next-hop-self
  neighbor 9.0.0.2 timers 3 9
  neighbor 9.0.0.2 route-map ACCEPT_REMOTE in

  ! Accept rogue AS routes with high preference
  neighbor 9.0.4.2 remote-as 4
  neighbor 9.0.4.2 ebgp-multihop
  neighbor 9.0.4.2 next-hop-self
  neighbor 9.0.4.2 timers 3 9
  neighbor 9.0.4.2 route-map PREFER_ROGUE in

route-map ACCEPT_REMOTE permit 10
  set local-preference 50

route-map PREFER_ROGUE permit 10
  set local-preference 250
  

log file /tmp/S1-bgpd.log
